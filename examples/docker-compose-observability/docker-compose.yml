services:
  filesystem:
    image: node:22-alpine
    working_dir: /srv
    command:
      - sh
      - -c
      - npx -y @modelcontextprotocol/server-filesystem --transport streamable-http --port 3000 /data
    volumes:
      - ./data:/data

  mcp-audit:
    build: ../..
    command:
      - --transport
      - http
      - --upstream
      - http://filesystem:3000/mcp
      - --port
      - "4422"
      - --storage
      - jsonl
    environment:
      AUDIT_SECRET: change-me
    ports:
      - "4422:4422"
      - "9090:9090"
      - "9091:9091"
    volumes:
      - ./audit.jsonl:/app/audit.jsonl
    depends_on:
      - filesystem

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9092:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - mcp-audit

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
