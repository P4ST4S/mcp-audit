services:
  mcp-audit:
    build: .
    command:
      - --transport
      - http
      - --upstream
      - http://filesystem:3000/mcp
      - --port
      - "4422"
      - --storage
      - jsonl
    environment:
      AUDIT_SECRET: change-me
    ports:
      - "4422:4422"
      - "9090:9090"
    volumes:
      - ./audit.jsonl:/app/audit.jsonl
    depends_on:
      - filesystem

  filesystem:
    image: node:22-alpine
    working_dir: /srv
    command:
      - sh
      - -c
      - npx -y @modelcontextprotocol/server-filesystem --transport streamable-http --port 3000 /data
    volumes:
      - ./data:/data
